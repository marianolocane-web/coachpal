<!-- @dsCard group="Colors" viewport="700x160" name="Semantic States" subtitle="Success / warning / danger" -->
<html>
<head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;background:var(--color-bg-surface);font-family:var(--font-body);padding:16px 20px;display:flex;gap:12px">
  <div style="flex:1;background:var(--color-success-subtle);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:6px">
    <div style="width:28px;height:28px;border-radius:50%;background:var(--color-success)"></div>
    <div style="font:var(--text-label-md);color:var(--green-700)">Hecho / success</div>
  </div>
  <div style="flex:1;background:var(--color-warning-subtle);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:6px">
    <div style="width:28px;height:28px;border-radius:50%;background:var(--color-warning)"></div>
    <div style="font:var(--text-label-md);color:var(--amber-700)">Racha / energía</div>
  </div>
  <div style="flex:1;background:var(--color-danger-subtle);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:6px">
    <div style="width:28px;height:28px;border-radius:50%;background:var(--color-danger)"></div>
    <div style="font:var(--text-label-md);color:var(--coral-700)">Pendiente / roto</div>
  </div>
</body>
</html>
