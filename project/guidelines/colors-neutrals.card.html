<!-- @dsCard group="Colors" viewport="700x200" name="Neutrals (Sand)" subtitle="Papel cálido, no gris frío" -->
<html>
<head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;background:var(--color-bg-surface);font-family:var(--font-body);padding:16px 20px">
  <div style="display:grid;grid-template-columns:repeat(9,1fr);gap:6px">
    <div><div style="height:56px;border-radius:10px;background:var(--sand-25);border:1px solid var(--sand-200)"></div><div style="font-size:10px;margin-top:4px;color:var(--color-text-tertiary)">25</div></div>
    <div><div style="height:56px;border-radius:10px;background:var(--sand-50)"></div><div style="font-size:10px;margin-top:4px;color:var(--color-text-tertiary)">50</div></div>
    <div><div style="height:56px;border-radius:10px;background:var(--sand-100)"></div><div style="font-size:10px;margin-top:4px;color:var(--color-text-tertiary)">100</div></div>
    <div><div style="height:56px;border-radius:10px;background:var(--sand-200)"></div><div style="font-size:10px;margin-top:4px;color:var(--color-text-tertiary)">200</div></div>
    <div><div style="height:56px;border-radius:10px;background:var(--sand-300)"></div><div style="font-size:10px;margin-top:4px;color:var(--color-text-tertiary)">300</div></div>
    <div><div style="height:56px;border-radius:10px;background:var(--sand-500)"></div><div style="font-size:10px;margin-top:4px;color:var(--color-text-tertiary)">500</div></div>
    <div><div style="height:56px;border-radius:10px;background:var(--sand-700)"></div><div style="font-size:10px;margin-top:4px;color:var(--color-text-tertiary)">700</div></div>
    <div><div style="height:56px;border-radius:10px;background:var(--sand-800)"></div><div style="font-size:10px;margin-top:4px;color:var(--color-text-tertiary)">800</div></div>
    <div><div style="height:56px;border-radius:10px;background:var(--sand-900)"></div><div style="font-size:10px;margin-top:4px;color:var(--color-text-tertiary)">900</div></div>
  </div>
</body>
</html>
