<html>
<head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;background:var(--color-bg-surface);font-family:var(--font-body);padding:16px 20px">
  <div style="display:flex;gap:10px">
    <div style="flex:1">
      <div style="height:64px;border-radius:12px;background:var(--green-500)"></div>
      <div style="font-size:12px;margin-top:6px;color:var(--color-text-secondary)">--green-500<br/>brand</div>
    </div>
    <div style="flex:1">
      <div style="height:64px;border-radius:12px;background:var(--green-600)"></div>
      <div style="font-size:12px;margin-top:6px;color:var(--color-text-secondary)">--green-600<br/>hover</div>
    </div>
    <div style="flex:1">
      <div style="height:64px;border-radius:12px;background:var(--amber-400)"></div>
      <div style="font-size:12px;margin-top:6px;color:var(--color-text-secondary)">--amber-400<br/>accent</div>
    </div>
    <div style="flex:1">
      <div style="height:64px;border-radius:12px;background:var(--amber-500)"></div>
      <div style="font-size:12px;margin-top:6px;color:var(--color-text-secondary)">--amber-500<br/>accent hover</div>
    </div>
    <div style="flex:1">
      <div style="height:64px;border-radius:12px;background:var(--coral-500)"></div>
      <div style="font-size:12px;margin-top:6px;color:var(--color-text-secondary)">--coral-500<br/>danger</div>
    </div>
  </div>
</body>
</html>
